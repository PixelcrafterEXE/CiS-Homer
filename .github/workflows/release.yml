name: Build and Release

on:
  push:
    branches:
      - Release

# ── Firmware image ────────────────────────────────────────────────────────────
jobs:
  build-firmware:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make python3 python3-pip python3-venv \
            quilt parted qemu-user-binfmt debootstrap zerofree dosfstools \
            libarchive-tools xxd file git kmod arch-test bc pigz

      - name: Build Image
        run: make build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: Firmware/deploy/image_*-homerpi-homer.img.xz
          if-no-files-found: error

# ── Linux x86_64 standalone binary ───────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -e Software

      - name: Build Linux binary
        run: pyinstaller --noconfirm --workpath build/pyinstaller homer.spec

      - name: Rename binary
        run: mv dist/homer dist/homer-linux-x86_64

      - name: Smoke-test Linux binary
        # Run the app on a virtual display for 8 seconds.
        # exit 124 = killed by timeout (app was alive) = pass
        # exit 0   = app exited cleanly               = pass
        # anything else = crash                        = fail
        run: |
          chmod +x dist/homer-linux-x86_64
          xvfb-run --auto-servernum timeout 8 ./dist/homer-linux-x86_64
          EXIT=$?
          if [ $EXIT -ne 124 ] && [ $EXIT -ne 0 ]; then
            echo "Smoke test FAILED: binary exited with code $EXIT"
            exit 1
          fi
          echo "Smoke test passed (exit $EXIT)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homer-linux-x86_64
          path: dist/homer-linux-x86_64
          if-no-files-found: error

# ── Windows executable ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -e Software

      - name: Build Windows exe
        run: pyinstaller --noconfirm --workpath build/pyinstaller homer.spec

      - name: Rename executable
        shell: bash
        run: mv dist/homer.exe dist/homer-windows.exe

      - name: Smoke-test Windows exe
        # Start the exe, wait 8 seconds, then check if it is still running.
        # If it exited early with a non-zero code it crashed = fail.
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\homer-windows.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            Write-Error "Smoke test FAILED: exe exited with code $($proc.ExitCode)"
            exit 1
          }
          if (-not $proc.HasExited) { $proc.Kill() }
          Write-Host "Smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homer-windows
          path: dist\homer-windows.exe
          if-no-files-found: error

# ── Flatpak bundle (wraps the Linux binary) ───────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-24.04
    needs: build-linux
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: homer-linux-x86_64
          # Place the binary next to the manifest so the 'path:' source resolves.
          path: .github/flatpak/

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-freedesktop-23.08

      - name: Install Flatpak tooling and runtimes
        run: |
          sudo apt-get install -y flatpak flatpak-builder xvfb
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive flathub \
            org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak bundle
        run: |
          chmod +x .github/flatpak/homer-linux-x86_64
          flatpak-builder --user --repo=flatpak-repo --force-clean \
            flatpak-build .github/flatpak/com.cis.Homer.yml
          flatpak build-bundle flatpak-repo homer.flatpak com.cis.Homer

      - name: Smoke-test Flatpak
        run: |
          flatpak install --user --noninteractive homer.flatpak
          xvfb-run --auto-servernum timeout 8 \
            flatpak run --user com.cis.Homer
          EXIT=$?
          if [ $EXIT -ne 124 ] && [ $EXIT -ne 0 ]; then
            echo "Smoke test FAILED: Flatpak exited with code $EXIT"
            exit 1
          fi
          echo "Smoke test passed (exit $EXIT)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homer-flatpak
          path: homer.flatpak
          if-no-files-found: error

# ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-firmware, build-linux, build-windows, build-flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Generate Release Tag
        run: echo "RELEASE_TAG=$(date +'%Y-%m-%d-%H%M%S')" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Homerpi Release ${{ env.RELEASE_TAG }}"
          files: |
            release-artifacts/firmware/image_*-homerpi-homer.img.xz
            release-artifacts/homer-linux-x86_64/homer-linux-x86_64
            release-artifacts/homer-windows/homer-windows.exe
            release-artifacts/homer-flatpak/homer.flatpak
          draft: false
          prerelease: false
          generate_release_notes: true
